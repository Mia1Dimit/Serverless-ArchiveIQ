name: Serverless-ArchiveIQ Terraform

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    paths:
      - infra/**
      - modules/**
      - environments/**
      - .github/workflows/terraform.yml
  push:
    branches:
      - main
    paths:
      - infra/**
      - modules/**
      - environments/**
      - .github/workflows/terraform.yml
  workflow_dispatch:

env:
  TF_VERSION: "1.8.5"
  AWS_REGION: "eu-west-1"
  TF_ROOT: "infra"
  TF_VARS_FILE: "../environments/dev.tfvars"
  TF_STATE_KEY: "serverless-archiveiq/dev/terraform.tfstate"
  TF_IN_AUTOMATION: "true"

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: true

jobs:
  plan-pr:
    name: Terraform PR Checks
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ env.AWS_REGION }}
      TF_TOKEN_your_registry_hostname: ${{ secrets.TF_REGISTRY_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: |
          terraform -chdir=${{ env.TF_ROOT }} init \
            -backend-config="bucket=${{ secrets.TF_BACKEND_BUCKET }}" \
            -backend-config="key=${{ env.TF_STATE_KEY }}" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}"

      - name: Terraform Validate
        run: terraform -chdir=${{ env.TF_ROOT }} validate

      - name: Terraform Plan
        run: |
          terraform -chdir=${{ env.TF_ROOT }} plan \
            -var-file=${{ env.TF_VARS_FILE }} \
            -out=tfplan \
            -no-color

      - name: Export Plan Text
        run: terraform -chdir=${{ env.TF_ROOT }} show -no-color tfplan > ${{ env.TF_ROOT }}/tfplan.txt

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-pr-${{ github.event.pull_request.number }}
          path: |
            ${{ env.TF_ROOT }}/tfplan
            ${{ env.TF_ROOT }}/tfplan.txt
          retention-days: 5

      - name: Comment plan summary on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync(`${process.env.TF_ROOT}/tfplan.txt`, 'utf8').slice(0, 60000);
            const body = [
              '### Terraform Plan',
              '',
              '> Plan generated for this PR.',
              '',
              '```hcl',
              plan,
              '```'
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

  apply-main:
    name: Terraform Apply on Main
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ env.AWS_REGION }}
      TF_TOKEN_your_registry_hostname: ${{ secrets.TF_REGISTRY_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: |
          terraform -chdir=${{ env.TF_ROOT }} init \
            -backend-config="bucket=${{ secrets.TF_BACKEND_BUCKET }}" \
            -backend-config="key=${{ env.TF_STATE_KEY }}" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}"

      - name: Terraform Plan
        run: |
          terraform -chdir=${{ env.TF_ROOT }} plan \
            -var-file=${{ env.TF_VARS_FILE }} \
            -out=tfplan \
            -no-color

      - name: Terraform Apply
        run: terraform -chdir=${{ env.TF_ROOT }} apply -auto-approve tfplan