# Infracost Policy Configuration
# Disables cost optimization policies that are less critical for dev environment

policies:
  disabled:
    # Lambda should use Graviton (ARM64) - skip for dev simplicity
    - name: "Lambda - consider using Graviton"
      enabled: false
      
    # DynamoDB should use provisioned billing - skip for dev pay-per-request
    - name: "DynamoDB - consider using provisioned tables rather than on-demand"
      enabled: false
      
    # DynamoDB should use TTL - skip for dev temporary tables
    - name: "DynamoDB - consider using TTL on tables"
      enabled: false

# Allow Infracost to continue without blocking on policy violations in dev
policy_enforcement_level: "warning"
